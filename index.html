<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ext_000 — Portfolio</title>
    <meta name="description" content="ext_000's personal portfolio. Roblox developer, Discord, Spotify. Dark-themed personal link hub.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ============================================ */
        /*  DESIGN SYSTEM                               */
        /* ============================================ */
        :root {
            --bg-primary: #020204;
            --bg-secondary: #08080c;
            --bg-card: rgba(8, 8, 14, 0.75);
            --bg-card-hover: rgba(14, 14, 22, 0.85);
            --border-subtle: rgba(120, 80, 255, 0.07);
            --border-glow: rgba(120, 80, 255, 0.2);
            --accent-primary: #7047eb;
            --accent-secondary: #9068ff;
            --accent-tertiary: #5533cc;
            --accent-spotify: #1aa34a;
            --accent-discord: #4752c4;
            --accent-roblox: #c4302b;
            --text-primary: #c8c5d4;
            --text-secondary: #6b6580;
            --text-muted: #3a3648;
            --glow-purple: 0 0 80px rgba(112, 71, 235, 0.08), 0 0 120px rgba(80, 50, 180, 0.04);
            --glow-spotify: 0 0 40px rgba(26, 163, 74, 0.08);
            --font-primary: 'Inter', -apple-system, system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-spring: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ============================================ */
        /*  RESET & BASE                                */
        /* ============================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-primary);
            background: #000000;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ============================================ */
        /*  BACKGROUND                                  */
        /* ============================================ */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-image {
            position: absolute;
            inset: -20px;
            background: url('assets/bg_void.png') center/cover no-repeat;
            opacity: 0.25;
            filter: blur(2px) saturate(0.8) brightness(0.6);
            animation: bgDrift 40s ease-in-out infinite alternate;
        }

        @keyframes bgDrift {
            0% { transform: scale(1.05) translate(0, 0); }
            33% { transform: scale(1.08) translate(-8px, 5px); }
            66% { transform: scale(1.06) translate(5px, -3px); }
            100% { transform: scale(1.1) translate(-3px, 8px); }
        }

        .bg-gradient {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(112, 71, 235, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(80, 50, 180, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 50% 50% at 20% 60%, rgba(40, 20, 120, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0) 0%, #000 100%);
            animation: gradientPulse 12s ease-in-out infinite alternate;
        }

        @keyframes gradientPulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* Dark vignette overlay */
        .bg-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 65% 55% at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.8) 100%);
            pointer-events: none;
        }

        .bg-noise {
            position: absolute;
            inset: 0;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
            mix-blend-mode: overlay;
        }

        /* ============================================ */
        /*  PARTICLES CANVAS                            */
        /* ============================================ */
        #particles-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* ============================================ */
        /*  CURSOR GLOW                                 */
        /* ============================================ */
        .cursor-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(112, 71, 235, 0.035) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
            opacity: 0;
        }

        /* ============================================ */
        /*  MAIN CONTENT                                */
        /* ============================================ */
        .main-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .content-card {
            width: 100%;
            max-width: 440px;
            background: rgba(5, 5, 10, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-xl);
            backdrop-filter: blur(40px) saturate(1.1);
            -webkit-backdrop-filter: blur(40px) saturate(1.1);
            padding: 40px 32px 32px;
            box-shadow: var(--glow-purple), 0 30px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.02);
            animation: cardEntry 0.8s var(--transition-smooth) both;
            position: relative;
            overflow: hidden;
        }

        .content-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(112, 71, 235, 0.3), transparent);
            opacity: 0.6;
        }

        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ============================================ */
        /*  PROFILE SECTION                             */
        /* ============================================ */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 28px;
        }

        .avatar-container {
            position: relative;
            margin-bottom: 18px;
        }

        .avatar-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--accent-primary), var(--accent-secondary), var(--accent-tertiary), var(--accent-primary));
            animation: ringRotate 4s linear infinite;
            opacity: 0.45;
        }

        @keyframes ringRotate {
            to { transform: rotate(360deg); }
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #000;
            position: relative;
            z-index: 2;
            transition: transform var(--transition-spring);
        }

        .avatar:hover {
            transform: scale(1.08);
        }

        .status-dot {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 16px;
            height: 16px;
            background: var(--accent-spotify);
            border: 3px solid var(--bg-primary);
            border-radius: 50%;
            z-index: 3;
            animation: statusPulse 2s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(29, 185, 84, 0.4); }
            50% { box-shadow: 0 0 0 6px rgba(29, 185, 84, 0); }
        }

        .username {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, rgba(200, 197, 212, 0.95) 0%, rgba(144, 104, 255, 0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            text-shadow: 0 0 40px rgba(112, 71, 235, 0.15);
        }

        .user-tag {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .bio {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-top: 10px;
            max-width: 320px;
        }

        .bio span {
            color: var(--accent-secondary);
        }

        /* ============================================ */
        /*  BADGES                                      */
        /* ============================================ */
        .badges {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: 1px solid;
            transition: all var(--transition-fast);
        }

        .badge-developer {
            color: rgba(138, 100, 255, 0.7);
            border-color: rgba(138, 100, 255, 0.12);
            background: rgba(138, 100, 255, 0.04);
        }

        .badge-gamer {
            color: rgba(226, 56, 42, 0.7);
            border-color: rgba(226, 56, 42, 0.12);
            background: rgba(226, 56, 42, 0.04);
        }

        .badge-music {
            color: rgba(29, 185, 84, 0.7);
            border-color: rgba(29, 185, 84, 0.12);
            background: rgba(29, 185, 84, 0.04);
        }

        .badge:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        /* ============================================ */
        /*  SPOTIFY NOW PLAYING                         */
        /* ============================================ */
        .spotify-section {
            background: rgba(15, 80, 40, 0.06);
            border: 1px solid rgba(29, 185, 84, 0.06);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all var(--transition-fast);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .spotify-section:hover {
            border-color: rgba(29, 185, 84, 0.15);
            background: rgba(15, 80, 40, 0.1);
            box-shadow: var(--glow-spotify);
        }

        .spotify-album-art {
            width: 52px;
            height: 52px;
            border-radius: var(--radius-sm);
            background: rgba(29, 185, 84, 0.07);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .spotify-album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-sm);
        }

        .spotify-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .spotify-label {
            font-size: 11px;
            color: var(--accent-spotify);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .spotify-bars {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 12px;
        }

        .spotify-bars span {
            display: block;
            width: 3px;
            background: var(--accent-spotify);
            border-radius: 1px;
            animation: barBounce 1s ease-in-out infinite;
        }

        .spotify-bars span:nth-child(1) { height: 4px; animation-delay: 0s; }
        .spotify-bars span:nth-child(2) { height: 8px; animation-delay: 0.15s; }
        .spotify-bars span:nth-child(3) { height: 5px; animation-delay: 0.3s; }
        .spotify-bars span:nth-child(4) { height: 10px; animation-delay: 0.45s; }

        @keyframes barBounce {
            0%, 100% { transform: scaleY(0.4); }
            50% { transform: scaleY(1); }
        }

        .spotify-song {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .spotify-artist {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .spotify-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: var(--accent-spotify);
            border-radius: 0 1px 0 0;
            transition: width 1s linear;
        }

        /* ============================================ */
        /*  ACTIVITY STATUS                             */
        /* ============================================ */
        .activity-section {
            background: rgba(80, 50, 200, 0.03);
            border: 1px solid rgba(120, 80, 255, 0.05);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .activity-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            background: rgba(100, 60, 220, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 20px;
        }

        .activity-info {
            flex: 1;
            min-width: 0;
        }

        .activity-label {
            font-size: 11px;
            color: var(--accent-primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .activity-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .activity-detail {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* ============================================ */
        /*  SOCIAL LINKS                                */
        /* ============================================ */
        .links-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.025);
            text-decoration: none;
            color: var(--text-primary);
            transition: all var(--transition-smooth);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .social-link::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .social-link:hover {
            transform: translateY(-2px) scale(1.01);
            border-color: rgba(255, 255, 255, 0.06);
        }

        .social-link:active {
            transform: translateY(0) scale(0.99);
        }

        /* Discord */
        .link-discord::before {
            background: linear-gradient(135deg, rgba(71, 82, 196, 0.06), transparent);
        }
        .link-discord:hover {
            border-color: rgba(71, 82, 196, 0.15);
            box-shadow: 0 4px 30px rgba(71, 82, 196, 0.06);
        }
        .link-discord:hover::before { opacity: 1; }
        .link-discord .link-icon { color: var(--accent-discord); }

        /* Roblox */
        .link-roblox::before {
            background: linear-gradient(135deg, rgba(196, 48, 43, 0.06), transparent);
        }
        .link-roblox:hover {
            border-color: rgba(196, 48, 43, 0.15);
            box-shadow: 0 4px 30px rgba(196, 48, 43, 0.06);
        }
        .link-roblox:hover::before { opacity: 1; }
        .link-roblox .link-icon { color: var(--accent-roblox); }

        /* Spotify */
        .link-spotify::before {
            background: linear-gradient(135deg, rgba(26, 163, 74, 0.06), transparent);
        }
        .link-spotify:hover {
            border-color: rgba(26, 163, 74, 0.15);
            box-shadow: 0 4px 30px rgba(26, 163, 74, 0.06);
        }
        .link-spotify:hover::before { opacity: 1; }
        .link-spotify .link-icon { color: var(--accent-spotify); }

        /* GitHub */
        .link-github::before {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.02), transparent);
        }
        .link-github:hover {
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(255, 255, 255, 0.02);
        }
        .link-github:hover::before { opacity: 1; }
        .link-github .link-icon { color: var(--text-secondary); }

        .link-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .link-icon svg {
            width: 22px;
            height: 22px;
        }

        .link-text {
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .link-name {
            font-weight: 600;
            font-size: 14px;
        }

        .link-handle {
            font-size: 12px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .link-arrow {
            margin-left: auto;
            color: var(--text-muted);
            transition: all var(--transition-fast);
            position: relative;
            z-index: 1;
        }

        .social-link:hover .link-arrow {
            transform: translateX(4px);
            color: var(--text-secondary);
        }

        /* ============================================ */
        /*  VISITOR COUNTER & STATS                     */
        /* ============================================ */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: var(--font-mono);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ============================================ */
        /*  MUSIC PLAYER (BOTTOM BAR)                   */
        /* ============================================ */
        .music-player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 18px;
            background: rgba(3, 3, 8, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 50px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            animation: playerSlideUp 1s 0.5s both;
        }

        @keyframes playerSlideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .music-toggle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(112, 71, 235, 0.6);
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }

        .music-toggle:hover {
            background: rgba(144, 104, 255, 0.7);
            transform: scale(1.1);
        }

        .music-toggle svg {
            width: 16px;
            height: 16px;
        }

        .music-info {
            display: flex;
            flex-direction: column;
        }

        .music-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .music-artist-label {
            font-size: 10px;
            color: var(--text-muted);
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 60px;
            height: 3px;
            background: rgba(255,255,255,0.04);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-primary);
            cursor: pointer;
            transition: transform var(--transition-fast);
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        .volume-slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-primary);
            cursor: pointer;
            border: none;
        }

        /* ============================================ */
        /*  FOOTER                                      */
        /* ============================================ */
        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .footer-text span {
            color: var(--accent-primary);
        }

        /* ============================================ */
        /*  RESPONSIVE                                  */
        /* ============================================ */
        @media (max-width: 480px) {
            .content-card {
                padding: 32px 20px 24px;
                border-radius: var(--radius-lg);
            }

            .username {
                font-size: 22px;
            }

            .music-player {
                bottom: 12px;
                padding: 8px 14px;
            }
        }

        /* ============================================ */
        /*  SCROLL ANIMATIONS                           */
        /* ============================================ */
        .fade-in {
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInUp 0.5s ease-out forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }
        .delay-6 { animation-delay: 0.6s; }
        .delay-7 { animation-delay: 0.7s; }
        .delay-8 { animation-delay: 0.8s; }

        /* ============================================ */
        /*  TIME DISPLAY                                */
        /* ============================================ */
        .clock {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 50;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 1px;
            animation: fadeInUp 1s 0.3s both;
        }

        .views-badge {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 50;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            animation: fadeInUp 1s 0.3s both;
        }

        .views-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent-spotify);
            border-radius: 50%;
            animation: statusPulse 2s ease-in-out infinite;
        }

        /* ============================================ */
        /*  TYPING EFFECT                               */
        /* ============================================ */
        .typing-text {
            display: inline;
            border-right: 2px solid var(--accent-primary);
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* ============================================ */
        /*  TOOLTIP                                     */
        /* ============================================ */
        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: all var(--transition-fast);
            border: 1px solid var(--border-subtle);
        }

        .tooltip:hover::after {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
    </style>
</head>
